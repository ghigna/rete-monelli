<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stalkers di Comunità — Rete Monelli</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link id="font-link" href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
/* --- VARIABILI E RESET --- */
:root {
  --accent: #0000ff; --accent-dark: #0000cc; --accent-light: #e8e8ff; --accent-mid: #9999ff;
  --bg: #f5f5ff; --ink: #0a0a2e; --muted: #6666aa; --panel: #fff; --border: #d0d0ee; --spes: #ffcc00;
  --font: 'Nunito', sans-serif;
  --sidebar-w: 300px;
  --z-map: 400; --z-ui: 1000; --z-modal: 1500; --z-loading: 2000;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: var(--font); background: var(--bg); color: var(--ink); overflow: hidden; }
#app { display: flex; flex-direction: column; height: 100vh; }

/* --- NAV --- */
#nav { display: flex; background: var(--accent); flex-shrink: 0; min-height: 52px; align-items: stretch; z-index: var(--z-ui); }
#nav-title { padding: 0 20px; display: flex; align-items: center; gap: 10px; margin-right: auto; }
#nav-title h1 { font-size: .95rem; font-weight: 800; color: #fff; }
.nav-tab { padding: 0 20px; display: flex; align-items: center; gap: 7px; font-size: .78rem; font-weight: 700; color: rgba(255,255,255,.5); cursor: pointer; border: none; background: none; text-transform: uppercase; border-bottom: 3px solid transparent; transition: all .18s; }
.nav-tab.active { color: #fff; border-bottom-color: var(--spes); }

/* --- DASHBOARD --- */
#dashboard { display: flex; flex-shrink: 0; border-bottom: 1px solid var(--border); background: var(--panel); overflow-x: auto; }
.dash-card { flex: 1; min-width: 120px; padding: 11px 16px; border-right: 1px solid var(--border); cursor: pointer; position: relative; }
.dash-card:hover { background: var(--bg); }
.dash-card.active-filter { background: var(--accent-light); }
.dash-num { font-size: 1.5rem; font-weight: 800; line-height: 1; }
.dash-label { font-size: .62rem; font-weight: 700; text-transform: uppercase; color: var(--muted); margin-top: 3px; }
.dash-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; }

/* --- LAYOUT AREA --- */
#page-mappa, #page-ragnatela, #page-stile { display: none; flex: 1; overflow: hidden; }
#page-mappa.active { display: flex; flex-direction: column; }
#page-ragnatela.active { display: flex; position: relative; }
#page-stile.active { display: block; overflow-y: auto; padding: 32px; }

#map-area { display: flex; flex: 1; overflow: hidden; position: relative; }
#sidebar { width: var(--sidebar-w); flex-shrink: 0; display: flex; flex-direction: column; background: var(--panel); border-right: 1px solid var(--border); }
#map { flex: 1; z-index: var(--z-map); }

/* --- PANNELLO MODIFICA (FIX RESPONSIVE) --- */
#edit-panel { 
  position: fixed; bottom: 0; left: var(--sidebar-w); right: 0; 
  background: #fff; border-top: 3px solid var(--accent); padding: 16px; 
  transform: translateY(100%); transition: transform .3s cubic-bezier(0.4, 0, 0.2, 1); 
  z-index: var(--z-ui); box-shadow: 0 -4px 20px rgba(0,0,0,0.15); 
}
#edit-panel.open { transform: translateY(0); }
@media (max-width: 768px) {
  #sidebar { display: none; }
  #edit-panel { left: 0; }
}

/* --- ELEMENTI UI --- */
.list-item { padding: 10px 15px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s; }
.list-item.selected { background: var(--accent-light); border-left: 4px solid var(--accent); }
.stato-badge { font-size: .6rem; padding: 2px 6px; border-radius: 4px; font-weight: 700; text-transform: uppercase; }

/* --- LOADING --- */
#loading-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: var(--z-loading); }
.spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <p id="loading-msg" style="margin-top:15px; font-weight:700;">Inizializzazione Rete...</p>
</div>

<div id="app">
  <div id="nav">
    <div id="nav-title"><h1>Stalkers di Comunità</h1></div>
    <button class="nav-tab active" data-page="mappa">🗺 Mappa</button>
    <button class="nav-tab" data-page="ragnatela">🕸 Ragnatela</button>
    <button class="nav-tab" data-page="stile">🎨 Stile</button>
    <div id="sync-status" style="display:flex; align-items:center; padding:0 15px; font-size:.7rem; color:#fff; opacity:0.6;">
        <div id="sync-dot" style="width:8px; height:8px; border-radius:50%; background:#fff; margin-right:6px;"></div>
        <span id="sync-label">Pronto</span>
    </div>
  </div>

  <div id="page-mappa" class="active">
    <div id="dashboard">
      <div class="dash-card dash-total active-filter" data-stato="tutti">
        <div class="dash-num" id="d-total">0</div>
        <div class="dash-label">Totale</div>
        <div class="dash-bar" style="background:var(--accent)"></div>
      </div>
      <div class="dash-card" data-stato="In collaborazione">
        <div class="dash-num" id="d-col">0</div>
        <div class="dash-label">In collab.</div>
        <div class="dash-bar" style="background:#2ecc71"></div>
      </div>
      <div class="dash-card" data-stato="Contattato">
        <div class="dash-num" id="d-cnt">0</div>
        <div class="dash-label">Contattati</div>
        <div class="dash-bar" style="background:#4a9eff"></div>
      </div>
    </div>

    <div id="map-area">
      <div id="sidebar">
        <div style="padding:15px; background:var(--bg);">
          <input type="text" id="search-input" placeholder="Cerca realtà..." style="width:100%; padding:8px; border-radius:6px; border:1px solid var(--border);">
        </div>
        <div id="list-container" style="flex:1; overflow-y:auto;"></div>
      </div>
      <div id="map"></div>
    </div>
  </div>

  <div id="edit-panel">
    <h3 id="edit-title" style="margin-bottom:12px; font-size:1rem;">Modifica Realtà</h3>
    <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap:10px;">
      <div class="edit-field">
        <label style="font-size:10px; font-weight:800; text-transform:uppercase;">Stato</label>
        <select id="edit-stato" style="width:100%; padding:8px;">
            <option>Da contattare</option>
            <option>Contattato</option>
            <option>In collaborazione</option>
            <option>Non interessato</option>
        </select>
      </div>
      <div class="edit-field">
        <label style="font-size:10px; font-weight:800; text-transform:uppercase;">Referente</label>
        <input type="text" id="edit-contatto" style="width:100%; padding:8px;">
      </div>
      <div class="edit-field" style="grid-column: span 2;">
        <label style="font-size:10px; font-weight:800; text-transform:uppercase;">Note</label>
        <textarea id="edit-note" style="width:100%; padding:8px; height:60px;"></textarea>
      </div>
    </div>
    <div style="margin-top:15px; display:flex; gap:10px;">
      <button onclick="App.saveEdit()" id="save-btn" style="background:var(--accent); color:#fff; border:none; padding:8px 20px; border-radius:4px; font-weight:700; cursor:pointer;">Salva Modifiche</button>
      <button onclick="App.closeEdit()" style="background:#eee; border:none; padding:8px 20px; border-radius:4px; cursor:pointer;">Annulla</button>
      <span id="save-feedback" style="font-size:.8rem; align-self:center;"></span>
    </div>
  </div>

  <div id="page-ragnatela">
      <div id="ragnatela-map" style="width:100%; height:100%; background:#000;"></div>
  </div>
</div>

<script>
/**
 * APP MODULE - Stalkers di Comunità
 */
const App = {
    // Configurazione
    SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbyzdn0USuYLzzX3I4f7Nf3HAfZx2YqzzKfZoaEJwJOSNKu4EBKFnGmYJdKX9iyGKtJcUg/exec',
    SPES_ID: 'Spes Contra Spem',
    
    // Stato
    data: [],
    markers: [],
    markerLayer: null,
    map: null,
    activeStato: 'tutti',
    searchQuery: '',
    editingIndex: null,

    init() {
        this.initMap();
        this.bindEvents();
        this.loadData();
    },

    initMap() {
        this.map = L.map('map').setView([41.945, 12.55], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(this.map);
        this.markerLayer = L.layerGroup().addTo(this.map);
    },

    bindEvents() {
        // Navigazione
        document.querySelectorAll('.nav-tab').forEach(btn => {
            btn.onclick = () => this.showPage(btn.dataset.page, btn);
        });

        // Dashboard filtri
        document.querySelectorAll('.dash-card').forEach(card => {
            card.onclick = () => {
                document.querySelectorAll('.dash-card').forEach(c => c.classList.remove('active-filter'));
                card.classList.add('active-filter');
                this.activeStato = card.dataset.stato;
                this.render();
            };
        });

        // Ricerca
        document.getElementById('search-input').oninput = (e) => {
            this.searchQuery = e.target.value.toLowerCase();
            this.render();
        };
    },

    async loadData() {
        this.setSync('saving', 'Caricamento...');
        try {
            const response = await fetch(this.SCRIPT_URL);
            const result = await response.json();
            if(result.status === 'ok') {
                this.data = result.data.filter(d => d.Lat && d.Lng);
                this.setSync('ok', 'Sincronizzato');
            }
        } catch (e) {
            console.error("Errore fetch, uso fallback", e);
            this.setSync('error', 'Offline');
            // Fallback locale se necessario
        }
        document.getElementById('loading-overlay').style.display = 'none';
        this.updateStats();
        this.render();
    },

    render() {
        // Pulisci i marker esistenti in un colpo solo
        this.markerLayer.clearLayers();
        const container = document.getElementById('list-container');
        container.innerHTML = '';

        const filtered = this.data.filter(d => {
            const matchesStato = this.activeStato === 'tutti' || d.Stato === this.activeStato;
            const matchesSearch = d.Nome.toLowerCase().includes(this.searchQuery);
            return matchesStato && matchesSearch;
        });

        filtered.forEach((d, idx) => {
            // Marker
            const isSpes = d.Nome === this.SPES_ID;
            const marker = L.circleMarker([d.Lat, d.Lng], {
                radius: isSpes ? 10 : 6,
                fillColor: isSpes ? '#ffcc00' : '#0000ff',
                color: '#fff',
                weight: 2,
                fillOpacity: 0.8
            });
            
            marker.on('click', () => this.openEdit(this.data.indexOf(d)));
            this.markerLayer.addLayer(marker);

            // Lista
            const item = document.createElement('div');
            item.className = 'list-item';
            item.innerHTML = `<strong>${d.Nome}</strong><br><span class="stato-badge">${d.Stato}</span>`;
            item.onclick = () => {
                this.map.flyTo([d.Lat, d.Lng], 15);
                this.openEdit(this.data.indexOf(d));
            };
            container.appendChild(item);
        });
    },

    openEdit(idx) {
        this.editingIndex = idx;
        const d = this.data[idx];
        document.getElementById('edit-title').textContent = d.Nome;
        document.getElementById('edit-stato').value = d.Stato;
        document.getElementById('edit-contatto').value = d.Contatto || '';
        document.getElementById('edit-note').value = d.Note || '';
        document.getElementById('edit-panel').classList.add('open');
    },

    closeEdit() {
        document.getElementById('edit-panel').classList.remove('open');
    },

    async saveEdit() {
        const btn = document.getElementById('save-btn');
        const d = this.data[this.editingIndex];
        
        d.Stato = document.getElementById('edit-stato').value;
        d.Contatto = document.getElementById('edit-contatto').value;
        d.Note = document.getElementById('edit-note').value;

        btn.disabled = true;
        this.setSync('saving', 'Salvataggio...');

        try {
            // Nota: GAS richiede spesso il redirect. no-cors impedisce lettura risposta.
            // Se il GAS non è configurato per CORS, questa fetch potrebbe apparire come errore
            await fetch(this.SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', 
                body: JSON.stringify(d)
            });
            
            this.setSync('ok', 'Salvato');
            this.render();
            this.updateStats();
            setTimeout(() => this.closeEdit(), 1000);
        } catch (e) {
            this.setSync('error', 'Errore salvataggio');
        } finally {
            btn.disabled = false;
        }
    },

    updateStats() {
        document.getElementById('d-total').textContent = this.data.length;
        document.getElementById('d-col').textContent = this.data.filter(d => d.Stato === 'In collaborazione').length;
        document.getElementById('d-cnt').textContent = this.data.filter(d => d.Stato === 'Contattato').length;
    },

    showPage(pageId, btn) {
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('#page-mappa, #page-ragnatela, #page-stile').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        if(pageId === 'mappa') this.map.invalidateSize();
    },

    setSync(state, label) {
        const dot = document.getElementById('sync-dot');
        const lbl = document.getElementById('sync-label');
        lbl.textContent = label;
        dot.style.background = state === 'ok' ? '#4cff9a' : (state === 'saving' ? '#ffcc00' : '#ff6666');
    }
};

document.addEventListener('DOMContentLoaded', () => App.init());
</script>

</body>
</html>
